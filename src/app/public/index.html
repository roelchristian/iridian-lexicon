<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iridian Lexicon</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>

<!-- Top bar -->
<header>
  <h1>Iridian Lexicon</h1>
  <span class="subtitle" id="db-subtitle">loading…</span>
  <div class="spacer"></div>
  <button onclick="App.rebuild()" id="btn-rebuild">⟳ Rebuild DB</button>
  <button onclick="App.exportArtifacts()" id="btn-export">⬆ Export</button>
  <button onclick="window.location='/manual'" class="primary">? Manual</button>
</header>

<!-- Main layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-tabs">
      <button class="active" id="stab-entries" onclick="App.switchSidebarTab('entries',this)">Entries</button>
      <button id="stab-rules" onclick="App.switchSidebarTab('rules',this)">Rules</button>
    </div>

    <!-- Entries tab -->
    <div id="sidebar-entries" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="sidebar-head">
        <input type="search" id="search-box" placeholder="Search entries…" oninput="App.search(this.value)" />
        <div class="filter-row">
          <select id="filter-kind" onchange="App.applyFilters()">
            <option value="">All kinds</option>
            <option value="lexeme">Lexemes</option>
            <option value="morpheme">Morphemes</option>
          </select>
          <select id="filter-cat" onchange="App.applyFilters()">
            <option value="">All categories</option>
            <option value="noun">Nouns</option>
            <option value="verb">Verbs</option>
            <option value="modifier">Modifiers</option>
            <option value="function-word">Function words</option>
            <option value="postposition">Postpositions</option>
          </select>
        </div>
        <div style="display:flex;gap:6px">
          <button onclick="App.openEntryEditor()" style="flex:1;background:var(--accent);border:none;color:#0f1117;padding:5px 0;border-radius:var(--radius);font-size:12px;font-family:var(--font-sans);font-weight:600;cursor:pointer">+ Lexeme</button>
          <button onclick="App.openMorphemeEditor()" style="flex:1;background:var(--surface2);border:1px solid var(--accent2);color:var(--accent2);padding:5px 0;border-radius:var(--radius);font-size:12px;font-family:var(--font-sans);font-weight:600;cursor:pointer">+ Morpheme</button>
        </div>
      </div>
      <div class="entry-list" id="entry-list">
        <div class="empty-state" style="height:200px">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- Rules tab -->
    <div id="sidebar-rules" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="sidebar-head">
        <input type="search" id="rule-search-box" placeholder="Search rules…" oninput="App.filterRuleList(this.value)" />
        <button onclick="App.openRuleEditor()" style="background:var(--accent);border:none;color:#0f1117;padding:5px 0;border-radius:var(--radius);font-size:12px;font-family:var(--font-sans);font-weight:600;cursor:pointer;width:100%">+ New Rule</button>
      </div>
      <div class="entry-list" id="rule-list">
        <div class="empty-state" style="height:200px"><div class="spinner"></div></div>
      </div>
    </div>
  </aside>

  <!-- Main panel -->
  <main>
    <div class="panel active" id="panel-welcome">
      <div class="empty-state">
        <div class="icon">📖</div>
        <h2>Iridian Lexicon</h2>
        <p>Select an entry from the sidebar to view its details.<br/>Use the search box to filter by lemma, gloss, or key.</p>
        <p style="margin-top:8px"><a href="/manual" style="color:var(--accent)">Read the user manual →</a></p>
      </div>
    </div>

    <!-- Combined entry detail: info + paradigm + examples in one scroll -->
    <div class="panel" id="panel-entry"></div>

    <!-- Rules editor panel (shown when Rules sidebar tab is active) -->
    <div class="panel" id="panel-rules">
      <div class="rules-split">
        <div class="rules-list-col">
          <div class="rules-list-head">
            <span>Inflection Rules</span>
          </div>
          <div class="rules-list-scroll" id="rules-list-inner"></div>
        </div>
        <div class="rules-editor-col" id="rules-editor-col">
          <div class="empty-state">
            <div class="icon">⚙</div>
            <h2>Rule Editor</h2>
            <p>Select a rule from the list, or click + New Rule to create one.</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Status bar -->
<div class="statusbar">
  <span id="status-entries">—</span>
  <span id="status-forms">—</span>
  <span id="status-db">—</span>
</div>

<div id="toast"></div>
<div id="overlay" onclick="App.closeDrawer()"></div>

<!-- Entry / Rule editor drawer -->
<div id="drawer">
  <div class="drawer-header">
    <h2 id="drawer-title">New Entry</h2>
    <button id="drawer-delete-btn" class="danger" onclick="App.deleteCurrentEntry()" style="display:none">Delete</button>
    <button onclick="App.closeDrawer()">Cancel</button>
    <button class="primary" onclick="App.saveDrawer()" id="drawer-save-btn">Save</button>
  </div>
  <div class="drawer-body" id="drawer-body">
    <!-- content injected by JS -->
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
