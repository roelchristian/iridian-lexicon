<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iridian Lexicon</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232636;
      --border: #2d3148;
      --accent: #6c8ef0;
      --accent2: #a78bfa;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e4f0;
      --text-muted: #7b82a8;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
      --radius: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ───────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 48px;
      flex-shrink: 0;
      user-select: none;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--accent);
    }

    header .subtitle {
      color: var(--text-muted);
      font-size: 12px;
    }

    header .spacer { flex: 1; }

    header button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-sans);
      transition: background 0.15s;
    }
    header button:hover { background: var(--border); }
    header button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f1117;
      font-weight: 600;
    }
    header button.primary:hover { filter: brightness(1.1); }

    /* ── Layout ────────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ───────────────────────────────────────────────────── */
    aside {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-head {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-head input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: var(--font-sans);
      width: 100%;
      outline: none;
    }
    .sidebar-head input:focus { border-color: var(--accent); }
    .sidebar-head input::placeholder { color: var(--text-muted); }

    .filter-row {
      display: flex;
      gap: 6px;
    }
    .filter-row select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 8px;
      border-radius: var(--radius);
      font-size: 12px;
      font-family: var(--font-sans);
      outline: none;
    }
    .filter-row select:focus { border-color: var(--accent); }

    .entry-list {
      overflow-y: auto;
      flex: 1;
    }

    .entry-item {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .entry-item:hover { background: var(--surface2); }
    .entry-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }

    .entry-item .key {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
    }
    .entry-item .lemma {
      font-size: 13px;
      font-style: italic;
    }
    .entry-item .gloss {
      color: var(--text-muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-item .badges {
      display: flex;
      gap: 4px;
      margin-top: 2px;
    }

    /* ── Main panel ────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .tab-bar button {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 10px 18px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-sans);
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }
    .tab-bar button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-bar button:hover { color: var(--text); }

    .panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: none;
    }
    .panel.active { display: block; }

    /* ── Empty state ───────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 36px; }
    .empty-state h2 { font-size: 16px; color: var(--text); }
    .empty-state p { font-size: 13px; text-align: center; max-width: 320px; }

    /* ── Entry detail ──────────────────────────────────────────────── */
    .entry-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }
    .entry-header h2 {
      font-size: 22px;
      font-style: italic;
      font-weight: 700;
    }
    .entry-header .key-chip {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 99px;
      color: var(--accent);
      margin-top: 6px;
    }

    /* ── Badges ────────────────────────────────────────────────────── */
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-noun { background: #1e3a5f; color: #7dd3fc; }
    .badge-verb { background: #1e3a2f; color: #6ee7b7; }
    .badge-modifier { background: #3a2a1e; color: #fcd34d; }
    .badge-fw { background: #3a1e3a; color: #d8b4fe; }
    .badge-morpheme { background: #2a1e3a; color: #c084fc; }
    .badge-active { background: #1a3a1a; color: #4ade80; }
    .badge-draft { background: #3a3a1a; color: #fbbf24; }
    .badge-deprecated { background: #3a1a1a; color: #f87171; }

    /* ── Info grid ──────────────────────────────────────────────────── */
    .info-grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 8px 16px;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .info-grid dt { color: var(--text-muted); font-size: 12px; display: flex; align-items: center; }
    .info-grid dd { font-size: 13px; }

    /* ── Forms table ────────────────────────────────────────────────── */
    .forms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }
    .form-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .form-cell .slot {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-bottom: 3px;
    }
    .form-cell .form {
      font-size: 16px;
      font-style: italic;
      font-weight: 600;
    }
    .form-cell.override { border-color: var(--yellow); }
    .form-cell.override .slot::after { content: ' ⚡'; color: var(--yellow); }

    /* ── Section headers ────────────────────────────────────────────── */
    .section-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    /* ── Examples ───────────────────────────────────────────────────── */
    .example-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .example-card .source { font-style: italic; font-size: 15px; margin-bottom: 4px; }
    .example-card .gloss { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .example-card .translation { color: var(--text); font-size: 13px; }

    /* ── Status bar ─────────────────────────────────────────────────── */
    .statusbar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 4px 16px;
      display: flex;
      gap: 20px;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .statusbar .ok { color: var(--green); }
    .statusbar .error { color: var(--red); }

    /* ── Loading & toast ────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toast {
      position: fixed;
      bottom: 40px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      z-index: 999;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--red); color: var(--red); }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Top bar -->
<header>
  <h1>Iridian Lexicon</h1>
  <span class="subtitle" id="db-subtitle">loading…</span>
  <div class="spacer"></div>
  <button onclick="App.rebuild()" id="btn-rebuild">⟳ Rebuild DB</button>
  <button onclick="App.exportArtifacts()" id="btn-export">⬆ Export</button>
  <button onclick="window.location='/manual'" class="primary">? Manual</button>
</header>

<!-- Main layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-head">
      <input type="search" id="search-box" placeholder="Search entries…" oninput="App.search(this.value)" />
      <div class="filter-row">
        <select id="filter-kind" onchange="App.applyFilters()">
          <option value="">All kinds</option>
          <option value="lexeme">Lexemes</option>
          <option value="morpheme">Morphemes</option>
        </select>
        <select id="filter-cat" onchange="App.applyFilters()">
          <option value="">All categories</option>
          <option value="noun">Nouns</option>
          <option value="verb">Verbs</option>
          <option value="modifier">Modifiers</option>
          <option value="function-word">Function words</option>
        </select>
      </div>
    </div>
    <div class="entry-list" id="entry-list">
      <div class="empty-state" style="height:200px">
        <div class="spinner"></div>
      </div>
    </div>
  </aside>

  <!-- Main panel -->
  <main>
    <div class="tab-bar" id="tab-bar" style="display:none">
      <button class="active" data-tab="info" onclick="App.switchTab('info', this)">Info</button>
      <button data-tab="forms" onclick="App.switchTab('forms', this)">Forms</button>
      <button data-tab="examples" onclick="App.switchTab('examples', this)">Examples</button>
    </div>

    <div class="panel active" id="panel-welcome">
      <div class="empty-state">
        <div class="icon">📖</div>
        <h2>Iridian Lexicon</h2>
        <p>Select an entry from the sidebar to view its details.<br/>Use the search box to filter by lemma, gloss, or key.</p>
        <p style="margin-top:8px"><a href="/manual" style="color:var(--accent)">Read the user manual →</a></p>
      </div>
    </div>

    <div class="panel" id="panel-info"></div>
    <div class="panel" id="panel-forms"></div>
    <div class="panel" id="panel-examples"></div>
  </main>
</div>

<!-- Status bar -->
<div class="statusbar">
  <span id="status-entries">—</span>
  <span id="status-forms">—</span>
  <span id="status-db">—</span>
</div>

<div id="toast"></div>

<script>
const App = (() => {
  let allEntries = [];
  let currentEntry = null;
  let searchTimer = null;

  // ── Init ────────────────────────────────────────────────────────────
  async function init() {
    await loadStatus();
    await loadEntries();
  }

  async function loadStatus() {
    try {
      const r = await fetch('/api/admin/status');
      const { meta, counts } = await r.json();
      document.getElementById('db-subtitle').textContent =
        `v${meta.db_schema_version ?? '?'} · built ${meta.built_at ? new Date(meta.built_at).toLocaleString() : '—'}`;
      document.getElementById('status-entries').textContent =
        `${counts.lexemes} lexemes · ${counts.morphemes} morphemes`;
      document.getElementById('status-forms').textContent =
        `${counts.forms} generated forms`;
      document.getElementById('status-db').textContent =
        `${counts.rules} rules · ${counts.examples} examples`;
    } catch {
      document.getElementById('db-subtitle').textContent = 'DB not ready';
    }
  }

  async function loadEntries() {
    const r = await fetch('/api/entries');
    const { entries } = await r.json();
    allEntries = entries;
    renderList(entries);
  }

  // ── Rendering ───────────────────────────────────────────────────────
  function renderList(entries) {
    const list = document.getElementById('entry-list');
    if (!entries.length) {
      list.innerHTML = '<div class="empty-state" style="height:200px"><p>No entries found</p></div>';
      return;
    }
    list.innerHTML = entries.map(e => `
      <div class="entry-item${currentEntry?.key === e.key ? ' active' : ''}"
           onclick="App.selectEntry('${e.key}')">
        <div style="display:flex;gap:6px;align-items:center">
          <span class="key">${e.key}</span>
          ${catBadge(e)}
          ${statusBadge(e.status)}
        </div>
        <div class="lemma">${e.display_lemma}</div>
        <div class="gloss">${e.glosses.slice(0,2).join('; ')}</div>
      </div>
    `).join('');
  }

  function catBadge(e) {
    if (e.entry_kind === 'morpheme') return '<span class="badge badge-morpheme">morpheme</span>';
    const cls = { noun:'badge-noun', verb:'badge-verb', modifier:'badge-modifier', 'function-word':'badge-fw' }[e.major_category] ?? '';
    return `<span class="badge ${cls}">${e.major_category}</span>`;
  }

  function statusBadge(s) {
    const cls = { active:'badge-active', draft:'badge-draft', deprecated:'badge-deprecated' }[s] ?? '';
    return s !== 'active' ? `<span class="badge ${cls}">${s}</span>` : '';
  }

  // ── Entry selection ─────────────────────────────────────────────────
  async function selectEntry(key) {
    const r = await fetch(`/api/entries/${key}`);
    currentEntry = await r.json();
    document.getElementById('tab-bar').style.display = 'flex';
    ['welcome'].forEach(p => {
      document.getElementById(`panel-${p}`).classList.remove('active');
    });
    switchTab('info', document.querySelector('[data-tab="info"]'));
    renderInfo(currentEntry);
    renderList(allEntries); // refresh active state
  }

  function renderInfo(e) {
    const panel = document.getElementById('panel-info');
    panel.innerHTML = `
      <div class="entry-header">
        <div>
          <h2>${e.display_lemma}</h2>
          <div style="display:flex;gap:6px;margin-top:4px">
            <span class="key-chip">${e.key}</span>
            ${catBadge(e)}
            ${statusBadge(e.status)}
          </div>
        </div>
      </div>

      <div class="section-header">Core information</div>
      <dl class="info-grid">
        <dt>ID</dt><dd style="font-family:var(--font-mono);font-size:11px">${e.id}</dd>
        <dt>Kind</dt><dd>${e.entry_kind}</dd>
        <dt>Category</dt><dd>${e.major_category}${e.subtype ? ' / ' + e.subtype : ''}</dd>
        <dt>Lemma</dt><dd style="font-style:italic">${e.lemma}</dd>
        <dt>Gloss(es)</dt><dd>${e.glosses.join('; ')}</dd>
        ${e.entry_kind === 'lexeme' ? `
          <dt>Template</dt><dd style="font-family:var(--font-mono);font-size:12px">${e.template_id ?? e.inflection_profile ?? '—'}</dd>
          <dt>Stem variants</dt><dd>${renderStemVariants(e.stem_variants)}</dd>
        ` : ''}
        ${e.entry_kind === 'morpheme' ? `
          <dt>Display form</dt><dd style="font-style:italic">${e.display_form}</dd>
          <dt>Gloss abbr</dt><dd style="font-family:var(--font-mono)">${e.gloss_abbr}</dd>
          <dt>Slot</dt><dd>${e.slot}</dd>
          <dt>Category</dt><dd>${e.category}</dd>
        ` : ''}
        <dt>Status</dt><dd>${e.status}</dd>
        <dt>Tags</dt><dd>${e.tags?.length ? e.tags.map(t => `<span style="font-family:var(--font-mono);font-size:11px;background:var(--surface2);padding:1px 6px;border-radius:4px">${t}</span>`).join(' ') : '—'}</dd>
        <dt>Source file</dt><dd style="font-family:var(--font-mono);font-size:11px">${e.source_file}</dd>
      </dl>

      ${e.notes ? `
        <div class="section-header">Notes</div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:20px;font-size:13px;line-height:1.7">${e.notes}</div>
      ` : ''}

      ${e.attested_in?.length ? `
        <div class="section-header">Attested in</div>
        <div style="margin-bottom:20px">${e.attested_in.map(a => `<span style="font-family:var(--font-mono);font-size:11px;background:var(--surface2);padding:2px 8px;border-radius:4px;margin-right:4px">${a}</span>`).join('')}</div>
      ` : ''}
    `;
  }

  function renderStemVariants(svs) {
    if (!svs?.length) return '—';
    return svs.map(sv => `<code style="font-size:11px">${sv.label}: <em>${sv.form}</em></code>`).join(', ');
  }

  async function renderFormsTab(key) {
    const panel = document.getElementById('panel-forms');
    panel.innerHTML = '<div class="spinner"></div>';
    const r = await fetch(`/api/entries/${key}/forms`);
    const { forms } = await r.json();
    if (!forms.length) {
      panel.innerHTML = '<div class="empty-state"><p>No generated forms for this entry.</p></div>';
      return;
    }
    panel.innerHTML = `
      <div class="section-header">Generated paradigm (${forms.length} forms)</div>
      <div class="forms-grid">
        ${forms.map(f => `
          <div class="form-cell${f.overridden ? ' override' : ''}">
            <div class="slot">${f.slot}</div>
            <div class="form">${f.form}</div>
            ${f.rule_key ? `<div style="font-size:10px;color:var(--text-muted);margin-top:2px">${f.rule_key}</div>` : ''}
          </div>
        `).join('')}
      </div>
      <p style="color:var(--text-muted);font-size:11px">⚡ = manual override</p>
    `;
  }

  async function renderExamplesTab(key) {
    const panel = document.getElementById('panel-examples');
    panel.innerHTML = '<div class="spinner"></div>';
    const r = await fetch(`/api/entries/${key}/examples`);
    const { examples } = await r.json();
    if (!examples.length) {
      panel.innerHTML = '<div class="empty-state"><p>No usage examples for this entry.</p></div>';
      return;
    }
    panel.innerHTML = `
      <div class="section-header">Usage examples (${examples.length})</div>
      ${examples.map(ex => `
        <div class="example-card">
          <div class="source">${renderTokens(ex.source_lang)}</div>
          <div class="gloss">${renderGlossLine(ex.gloss_line)}</div>
          <div class="translation">'${ex.translation}'</div>
          ${ex.notes ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px">${ex.notes}</div>` : ''}
        </div>
      `).join('')}
    `;
  }

  function renderTokens(tokens) {
    return tokens.map(t => {
      if (t.type === 'literal') return t.literal;
      if (t.type === 'form') return `<em>${t.key}.${t.slot}</em>`;
      if (t.type === 'morpheme') return `<em>${t.key}</em>`;
      return t.gloss ?? '';
    }).join(' ');
  }

  function renderGlossLine(tokens) {
    return tokens.map(t => t.gloss ?? t.literal ?? t.key ?? '').join('-');
  }

  // ── Tabs ─────────────────────────────────────────────────────────────
  async function switchTab(name, btn) {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById(`panel-${name}`)?.classList.add('active');

    if (!currentEntry) return;
    if (name === 'forms') await renderFormsTab(currentEntry.key);
    if (name === 'examples') await renderExamplesTab(currentEntry.key);
  }

  // ── Search & filter ──────────────────────────────────────────────────
  function search(q) {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(async () => {
      if (!q.trim()) { renderList(allEntries); return; }
      const r = await fetch(`/api/entries?q=${encodeURIComponent(q)}`);
      const { entries } = await r.json();
      renderList(entries);
    }, 200);
  }

  function applyFilters() {
    const kind = document.getElementById('filter-kind').value;
    const cat = document.getElementById('filter-cat').value;
    let filtered = allEntries;
    if (kind) filtered = filtered.filter(e => e.entry_kind === kind);
    if (cat) filtered = filtered.filter(e => e.major_category === cat);
    renderList(filtered);
  }

  // ── Admin actions ────────────────────────────────────────────────────
  async function rebuild() {
    document.getElementById('btn-rebuild').disabled = true;
    document.getElementById('btn-rebuild').textContent = '⟳ Rebuilding…';
    try {
      const r = await fetch('/api/admin/rebuild', { method: 'POST' });
      const data = await r.json();
      if (data.ok) {
        toast('✓ Rebuilt: ' + data.counts.lexemes + ' lexemes, ' + data.counts.forms + ' forms', 'success');
        await loadStatus();
        await loadEntries();
      } else {
        toast('✗ ' + (data.errors?.[0]?.message ?? 'Rebuild failed'), 'error');
      }
    } catch { toast('✗ Server error', 'error'); }
    document.getElementById('btn-rebuild').disabled = false;
    document.getElementById('btn-rebuild').textContent = '⟳ Rebuild DB';
  }

  async function exportArtifacts() {
    document.getElementById('btn-export').disabled = true;
    document.getElementById('btn-export').textContent = '⬆ Exporting…';
    try {
      const r = await fetch('/api/admin/export', { method: 'POST' });
      const data = await r.json();
      if (data.ok) {
        toast('✓ Exported to TEMP/ (' + data.manifest.form_count + ' forms)', 'success');
      } else {
        toast('✗ Export failed', 'error');
      }
    } catch { toast('✗ Server error', 'error'); }
    document.getElementById('btn-export').disabled = false;
    document.getElementById('btn-export').textContent = '⬆ Export';
  }

  // ── Toast ────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3500);
  }

  return { init, selectEntry, search, applyFilters, switchTab, rebuild, exportArtifacts };
})();

App.init();
</script>
</body>
</html>
