        - { feature: derivation, value: CAUS }
        - { feature: voice, value: APPL }
        - { feature: aspect, value: CONT }

    - slot: NEG.PROG
      suffix: "ime"
      features:
        - { feature: polarity, value: NEG }
        - { feature: aspect, value: PROG }

    - slot: NEG.APPL.PROG
      suffix: "ime"
      stem_variant: appl
      features:
        - { feature: polarity, value: NEG }
        - { feature: voice, value: APPL }
        - { feature: aspect, value: PROG }

    - slot: NEG.CAUS.PROG
      suffix: "ime"
      stem_variant: caus
      features:
        - { feature: polarity, value: NEG }
        - { feature: derivation, value: CAUS }
        - { feature: aspect, value: PROG }

    - slot: NEG.CAUS.ANTIP.PROG
      suffix: "ime"
      stem_variant: caus_antip
      features:
        - { feature: polarity, value: NEG }
        - { feature: derivation, value: CAUS }
        - { feature: voice, value: ANTIP }
        - { feature: aspect, value: PROG }

    - slot: NEG.CAUS.APPL.PROG
      suffix: "ime"
      stem_variant: caus_appl
      features:
        - { feature: polarity, value: NEG }
        - { feature: derivation, value: CAUS }
        - { feature: voice, value: APPL }
        - { feature: aspect, value: PROG }

    - slot: NEG.CTPV
      suffix: "ach"
      features:
        - { feature: polarity, value: NEG }
        - { feature: aspect, value: CTPV }

    - slot: NEG.APPL.CTPV
      suffix: "ach"
      stem_variant: appl
      features:
        - { feature: polarity, value: NEG }
        - { feature: voice, value: APPL }
        - { feature: aspect, value: CTPV }

    - slot: NEG.CAUS.CTPV
      suffix: "ach"
      stem_variant: caus
      features:
        - { feature: polarity, value: NEG }
        - { feature: derivation, value: CAUS }
        - { feature: aspect, value: CTPV }

    - slot: NEG.CAUS.ANTIP.CTPV
      suffix: "ach"
      stem_variant: caus_antip
      features:
        - { feature: polarity, value: NEG }
        - { feature: derivation, value: CAUS }
        - { feature: voice, value: ANTIP }
        - { feature: aspect, value: CTPV }

    - slot: NEG.CAUS.APPL.CTPV
      suffix: "ach"
      stem_variant: caus_appl
      features:
        - { feature: polarity, value: NEG }
        - { feature: derivation, value: CAUS }
        - { feature: voice, value: APPL }
        - { feature: aspect, value: CTPV }

    - slot: NEG.PASS.CONT
      suffix: "na"
      stem_variant: pass
      features:
